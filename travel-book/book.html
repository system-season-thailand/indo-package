<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>نجوم السفر — دليل الرحلة</title>
  <link rel="stylesheet" href="book.css">
  <style>.pbar{position:fixed;top:14px;left:14px;z-index:9}
    .pbtn{font-family:"Cairo",sans-serif;font-weight:700;background:#163a5d;color:#fff;border:0;padding:9px 16px;border-radius:8px;cursor:pointer}</style>
</head>
<body>
  <div class="pbar no-print"><button class="pbtn" id="btnPdf">تنزيل PDF (صفحات ثابتة)</button></div>
  <main id="book" class="viewer"></main>
  <script src="book.js"></script>
  <script src="config.js"></script>
  <script src="pdf-export.js"></script>
  <script>
    var LOADED=null;
    BOOK.load().then(function(d){ LOADED=d; var r=document.getElementById("book"); BOOK.render(d,r); BOOK.signalReady(r); })
      .catch(function(e){ document.getElementById("book").innerHTML='<p style="color:#fff;padding:24px">تعذّر تحميل البيانات: '+(e&&e.message)+'</p>'; window.__pdfReady=true; });
    document.getElementById("btnPdf").addEventListener("click",function(){
      var b=this; var t=b.textContent;
      TBExport.exportViaServer(LOADED,{onStart:function(){b.disabled=true;b.textContent="…جارٍ التوليد";},
        onDone:function(){b.disabled=false;b.textContent=t;},
        onError:function(e){b.disabled=false;b.textContent=t;alert("تعذّر توليد PDF عبر الخادم: "+(e&&e.message||e));}});
    });
  </script>
</body>
</html>
